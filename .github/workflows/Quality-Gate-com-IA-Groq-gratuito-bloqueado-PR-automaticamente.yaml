# Nome exibido no GitHub Actions
name: Quality Gate com IA + Issue Automática

# Define quando workflow pode ser executado
on:

  # Execução manual via botão "Run workflow"
  workflow_dispatch:

# Permissões necessárias
permissions:

  # Permite criar issues automaticamente
  issues: write

# Lista de jobs
jobs:

  # Nome interno do job
  quality-gate-ia:

    # Máquina virtual utilizada
    runs-on: ubuntu-latest

    # Passos do pipeline
    steps:

      # Faz clone do repositório
      - name: Clonar repositório
        uses: actions/checkout@v4

      # Configura Python
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:

          # Versão do Python
          python-version: '3.11'

      # Instala dependências
      - name: Instalar dependências
        run: |

          # Instala pytest
          pip install pytest pytest-cov

      # Executa testes e coleta cobertura
      - name: Coletar métricas

        # Variáveis de ambiente
        env:

          # Permite importar módulos locais
          PYTHONPATH: .

        run: |

          echo "Executando testes..."

          # Executa testes com cobertura
          # O || true impede interrupção imediata
          pytest tests_baixa --cov=src_baixa --cov-report=json -q || true

          echo "Lendo cobertura..."

          # Extrai cobertura do JSON
          COV=$(python -c "import json; d=json.load(open('coverage.json')); print(round(d['totals']['percent_covered']))")

          # Mostra cobertura
          echo "Cobertura atual: $COV%"

          # Salva variável global
          echo "COVERAGE=$COV" >> $GITHUB_ENV

      # Verifica autenticação GitHub CLI
      - name: Testar GitHub CLI

        env:

          # Token automático do GitHub
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        run: |

          echo "Verificando autenticação..."

          gh auth status

      # Consulta IA
      - name: Consultar IA — Quality Gate

        env:

          # Chave da GroqCloud
          GROQCLOUD_API_KEY: ${{ secrets.GROQCLOUD_API_KEY }}

          # Token GitHub
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        run: |

          echo "Consultando IA sobre qualidade do código..."

          # Requisição para IA
          RESPONSE=$(curl -s https://api.groq.com/openai/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GROQCLOUD_API_KEY" \
            -d '{
              "model": "llama-3.1-8b-instant",
              "messages": [
                {
                  "role": "system",
                  "content": "Você é um quality gate de pipeline CI/CD. Responda apenas APROVADO ou BLOQUEADO seguido de justificativa curta."
                },
                {
                  "role": "user",
                  "content": "Cobertura de testes: '"$COVERAGE"'%. Projeto Python com possível divisão por zero não testada. Deve avançar para produção?"
                }
              ]
            }')

          # Mostra resposta completa
          echo "Resposta da IA:"
          echo "$RESPONSE"

          # Extrai resposta textual
          DECISION=$(echo "$RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['choices'][0]['message']['content'] if 'choices' in r else 'BLOQUEADO - erro ao consultar IA')")

          # Mostra decisão
          echo "Decisão da IA:"
          echo "$DECISION"

          # Se IA bloquear pipeline
          if echo "$DECISION" | grep -q "BLOQUEADO"; then

            echo "::error::Quality Gate BLOQUEADO pela IA"

            echo "Criando issue automática..."

            # Cria issue automaticamente
            gh issue create \
              --title "Quality Gate bloqueado pela IA" \
              --body "Cobertura atual: $COVERAGE%. Decisão da IA: $DECISION"

            echo "Issue criada com sucesso."

            # Falha pipeline
            exit 1

          fi

          echo "Pipeline aprovado pela IA."