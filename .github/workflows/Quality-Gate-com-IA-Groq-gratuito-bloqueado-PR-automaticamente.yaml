# Nome do workflow exibido no GitHub Actions
name: Quality Gate com IA (GroqCloud) - Bloqueado se cobertura < 80% - abrindo issue automaticamente

# Define quando o workflow pode ser executado
on:

  # Permite execução manual pelo botão "Run workflow"
  workflow_dispatch:

# Permissões necessárias para criar issues automaticamente
permissions:
  issues: write

# Lista de jobs da pipeline
jobs:

  # Nome interno do job
  quality-gate-ia-gratuita:

    # Máquina virtual Linux utilizada
    runs-on: ubuntu-latest

    # Etapas da pipeline
    steps:

      # Faz clone do repositório
      - name: Clonar repositório
        uses: actions/checkout@v4

      # Configura ambiente Python
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:

          # Define versão do Python
          python-version: '3.11'

      # Instala dependências necessárias
      - name: Instalar dependências
        run: |

          # Instala pytest e cobertura
          pip install pytest pytest-cov

      # Executa testes e coleta métricas
      - name: Coletar métricas

        # Variáveis de ambiente
        env:

          # Faz Python reconhecer raiz do projeto
          PYTHONPATH: .

        run: |

          # Executa testes com cobertura
          # O || true impede interrupção imediata
          pytest tests_baixa --cov=src_baixa --cov-report=json -q || true

          # Lê percentual de cobertura do arquivo coverage.json
          COV=$(python -c "import json; d=json.load(open('coverage.json')); print(round(d['totals']['percent_covered']))")

          # Exibe cobertura
          echo "Cobertura atual: $COV%"

          # Salva variável para próximos steps
          echo "COVERAGE=$COV" >> $GITHUB_ENV

      # Consulta IA para decidir se pipeline deve passar
      - name: Consultar IA — Quality Gate

        # Variáveis protegidas
        env:

          # Chave da API GroqCloud
          GROQCLOUD_API_KEY: ${{ secrets.GROQCLOUD_API_KEY }}

          # Token automático do GitHub Actions
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        run: |

          echo "Consultando IA sobre qualidade do código..."

          # Requisição HTTP para IA
          RESPONSE=$(curl -s https://api.groq.com/openai/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GROQCLOUD_API_KEY" \
            -d '{
              "model": "llama-3.1-8b-instant",
              "messages": [
                {
                  "role": "system",
                  "content": "Você é um quality gate de pipeline CI/CD. Responda apenas APROVADO ou BLOQUEADO seguido de uma justificativa curta."
                },
                {
                  "role": "user",
                  "content": "Cobertura de testes: '"$COVERAGE"'%. Projeto Python com possível divisão por zero não testada. Deve avançar para produção?"
                }
              ]
            }')

          # Exibe resposta completa da IA
          echo "Resposta da IA:"
          echo "$RESPONSE"

          # Extrai somente conteúdo textual da resposta
          DECISION=$(echo "$RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['choices'][0]['message']['content'] if 'choices' in r else 'BLOQUEADO - erro ao consultar IA')")

          # Mostra decisão final
          echo "$DECISION"

          # Se IA bloquear pipeline
          if echo "$DECISION" | grep -q "BLOQUEADO"; then

            # Exibe erro visual no GitHub Actions
            echo "::error::Quality Gate BLOQUEADO pela IA"

            # Cria issue automática
            gh issue create \
              --title "Quality Gate bloqueado pela IA" \
              --body "A IA detectou cobertura insuficiente ou risco no código. Cobertura atual: $COVERAGE%. Decisão da IA: $DECISION"

            # Interrompe pipeline com erro
            exit 1

          fi