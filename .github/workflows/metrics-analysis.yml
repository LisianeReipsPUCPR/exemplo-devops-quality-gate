name: IA analisando métricas - aprovado pela IA

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:

  analisar-metricas:

    runs-on: ubuntu-latest

    steps:

      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Login GitHub CLI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: IA analisa métricas - aprovado pela IA
        env:
          GROQCLOUD_API_KEY: ${{ secrets.GROQCLOUD_API_KEY }}

        run: |

          echo "Lendo métricas..."

          METRICS=$(cat metrics/system-aprovado.json | jq -c . | sed 's/"/\\"/g')

          RESPONSE=$(curl -s https://api.groq.com/openai/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GROQCLOUD_API_KEY" \
            -d "{
              \"model\": \"llama-3.1-8b-instant\",
              \"messages\": [
                {
                  \"role\": \"system\",
                  "content": "Você é especialista em observabilidade. Responda APENAS com: APROVADO (métricas saudáveis, sem ação necessária) ou REPROVADO (valores críticos que exigem ação imediata). Não analise valores moderadamente altos ou recomendações - apenas classifique como aprovado ou reprovado."
                },
                {
                  "role": "user",
                  "content": "Analise estas métricas: $METRICS. Responda APENAS com APROVADO ou REPROVADO."
                }
              ]
            }")

          echo "$RESPONSE"

          DECISION=$(echo "$RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['choices'][0]['message']['content'])")

          echo "$DECISION"

          if echo "$DECISION" | grep -qiE "REPROVADO"; then

            ISSUE_URL=$(gh issue create \
              --title "Métricas reprovadas - ação necessária" \
              --body "$DECISION")

            echo "$ISSUE_URL"

            exit 1

          fi
          
          echo "✅ Métricas aprovadas! Pipeline prosseguindo..."
          exit 0