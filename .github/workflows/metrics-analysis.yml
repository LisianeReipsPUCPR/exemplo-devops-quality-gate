name: IA analisando métricas - reprovado pela IA

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:

  analisar-metricas:

    runs-on: ubuntu-latest

    steps:

      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Login GitHub CLI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: IA analisa métricas - reprovado pela IA
        env:
          GROQCLOUD_API_KEY: ${{ secrets.GROQCLOUD_API_KEY }}

        run: |

          echo "Lendo métricas..."

          METRICS=$(cat metrics/system-reprovado.json | jq -c . | sed 's/"/\\"/g')

          RESPONSE=$(curl -s https://api.groq.com/openai/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GROQCLOUD_API_KEY" \
            -d "{
              \"model\": \"llama-3.1-8b-instant\",
              \"messages\": [
                {
                  \"role\": \"system\",
                  \"content\": \"Você é especialista em observabilidade. Classifique as métricas como APROVADO ou REPROVADO usando estes thresholds:\\n- CPU > 80% = REPROVADO\\n- Memory > 85% = REPROVADO\\n- Latency > 2000ms = REPROVADO\\n- Error Rate > 5% = REPROVADO\\nSe TODOS os valores estão dentro dos limites, responda APENAS 'APROVADO'. Caso contrário, responda APENAS 'REPROVADO'. Nada mais.\"
                },
                {
                  \"role\": \"user\",
                  \"content\": \"Classifique estas métricas: $METRICS\"
                }
              ]
            }")

          echo "$RESPONSE"

          DECISION=$(echo "$RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['choices'][0]['message']['content'])")

          echo "$DECISION"

          if echo "$DECISION" | grep -qiE "REPROVADO"; then

            ISSUE_URL=$(gh issue create \
              --title "Métricas reprovadas - ação necessária" \
              --body "$DECISION")

            echo "$ISSUE_URL"

            exit 1

          fi
          
          echo "✅ Métricas aprovadas! Pipeline prosseguindo..."
          exit 0